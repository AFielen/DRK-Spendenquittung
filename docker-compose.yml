services:
  db:
    image: postgres:17-alpine
    container_name: spendenquittung-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spendenquittung
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sq-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  spendenquittung:
    build:
      context: .
    container_name: spendenquittung
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - caddy-net
      - sq-internal
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgres://postgres:postgres@db:5432/spendenquittung
      - SESSION_SECRET=${SESSION_SECRET}
      - IRON_SESSION_PASSWORD=${SESSION_SECRET}
      - MAILJET_API_KEY=${MAILJET_API_KEY}
      - MAILJET_SECRET_KEY=${MAILJET_SECRET_KEY}
      - MAIL_FROM=${MAIL_FROM:-noreply@drk-spendenquittung.de}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

networks:
  caddy-net:
    external: true
  sq-internal:
    driver: bridge

volumes:
  pgdata:
